name: Weekly Wi-Fi Rotation

on:
  schedule:
    # Runs at 00:00 UTC every Monday morning
    - cron: '0 0 * * 1'
  workflow_dispatch: # Keeps manual button execution enabled in the UI

permissions:
  contents: write # Explicitly grants the automated bot permission to push changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate Fresh HTML Page
        env:
          # Pulls your secure encrypted 52-row CSV string from repo secrets
          WIFI_VOUCHERS_RAW: ${{ secrets.WIFI_VOUCHERS }}
        # Run python by pointing directly to where the script sits
        run: python signage/generate_wifi.py

      - name: Commit and Push index.html
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Explicitly stage the file inside your nested directory layout
          git add signage/wifi/index.html
          
          # Checks for modifications, skipping cleanly if identical
          git diff-index --quiet HEAD || (git commit -m "Automated Weekly Wi-Fi Refresh" && git push)
