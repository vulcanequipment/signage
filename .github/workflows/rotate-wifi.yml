name: Weekly Wi-Fi Rotation

on:
  schedule:
    # Runs at 00:00 UTC every Monday (Adjust to your preferred time)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allows you to manually trigger a test build whenever you want

permissions:
  contents: write # Allows the workflow to push the updated index.html back to the repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Fresh HTML Page
        env:
          # Safely inject the encrypted repository secret as a temporary variable
          WIFI_VOUCHERS_RAW: ${{ secrets.WIFI_VOUCHERS }}
       working-directory: signage
       run: python generate_wifi.py

      - name: Commit and Push index.html
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit and push changes if index.html actually changed
          git diff-index --quiet HEAD || (git commit -m "Automated Weekly Wi-Fi Refresh" && git push)
