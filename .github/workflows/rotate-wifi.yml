name: Weekly Wi-Fi Rotation

on:
  schedule:
    # Runs at 00:00 UTC every Monday morning
    - cron: '0 0 * * 1'
  workflow_dispatch: # Keeps manual button execution enabled in the UI

permissions:
  contents: write # Explicitly grants the automated bot permission to push changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate Fresh HTML Page
        env:
          # Pulls your secure encrypted 52-row CSV string from repo secrets
          WIFI_VOUCHERS_RAW: ${{ secrets.WIFI_VOUCHERS }}
        working-directory: signage # Steps into your nested directory layer first
        run: python generate_wifi.py

      - name: Commit and Push index.html
        working-directory: signage # Executes the git commit from the same directory layer
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wifi/index.html
          # Checks for modifications to the tracked code, skipping cleanly if identical
          git diff-index --quiet HEAD || (git commit -m "Automated Weekly Wi-Fi Refresh" && git push)
