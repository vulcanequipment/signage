name: Weekly Wi-Fi Rotation

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: '.' # Forces GitHub to keep the workspace flat and clean

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Fresh HTML Page
        env:
          WIFI_VOUCHERS_RAW: ${{ secrets.WIFI_VOUCHERS }}
        run: python wifi/generate_wifi.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer Layout Tools
        run: npm install puppeteer

      - name: Render E-Ink Layout Image
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            // Bypass Chromium sandbox restrictions and force a 1.25x browser scale factor
            const browser = await puppeteer.launch({ 
              headless: 'new',
              args: [
                '--no-sandbox', 
                '--disable-setuid-sandbox',
                '--force-device-scale-factor=1.25'
              ] 
            });
            const page = await browser.newPage();
            
            // Set the viewport dimensions with the scale factor applied for a crisp render
            await page.setViewport({ 
              width: 960, 
              height: 540,
              deviceScaleFactor: 1.25
            });
            
            // Point to the exact workspace location of your freshly compiled HTML
            await page.goto('file://' + process.cwd() + '/wifi/wifi.html', { waitUntil: 'networkidle0' });
            
            // Inject a top padding override on the fly so the content doesn't collide with the C++ date/battery stamp
            await page.addStyleTag({ content: 'body { padding-top: 75px !important; box-sizing: border-box !important; }' });
            
            // Save the screenshot as a clean PNG image file in the same folder
            await page.screenshot({ path: 'wifi/display.png', type: 'png' });
            
            await browser.close();
            console.log('Successfully rendered scaled M5Paper canvas artifact without modifying source HTML.');
          })();
          "

      - name: Commit and Push Assets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Track both output files
          git add wifi/wifi.html
          git add wifi/display.png
          
          git diff-index --quiet HEAD || (git commit -m "Automated Weekly Wi-Fi Refresh and E-Ink Image Update" && git push)
