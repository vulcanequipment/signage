name: Weekly Wi-Fi Rotation

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: '.' # Forces GitHub to keep the workspace flat and clean

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Fresh HTML Page
        env:
          WIFI_VOUCHERS_RAW: ${{ secrets.WIFI_VOUCHERS }}
        run: python generate_wifi.py

      - name: Commit and Push wifi.html
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add wifi/wifi.html
          git diff-index --quiet HEAD || (git commit -m "Automated Weekly Wi-Fi Refresh" && git push)
