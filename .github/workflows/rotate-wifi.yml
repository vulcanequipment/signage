name: Weekly Wi-Fi Rotation

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: '.' # Forces GitHub to keep the workspace flat and clean

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Fresh HTML Page
        env:
          WIFI_VOUCHERS_RAW: ${{ secrets.WIFI_VOUCHERS }}
        run: python wifi/generate_wifi.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer Layout Tools
        run: npm install puppeteer

      - name: Render E-Ink Layout Image
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            // Bypass Chromium sandbox restrictions inside container environments
            const browser = await puppeteer.launch({ 
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox'] 
            });
            const page = await browser.newPage();
            
            // Lock window boundaries to the physical resolution of the M5Paper
            await page.setViewport({ width: 960, height: 540 });
            
            // Point to the exact workspace location of your freshly compiled HTML
            await page.goto('file://' + process.cwd() + '/wifi/wifi.html', { waitUntil: 'networkidle0' });
            
            // Save the screenshot as a clean PNG image file in the same folder
            await page.screenshot({ path: 'wifi/display.png', type: 'png' });
            
            await browser.close();
            console.log('Successfully rendered M5Paper canvas artifact.');
          })();
          "

      - name: Commit and Push Assets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Track both output files
          git add wifi/wifi.html
          git add wifi/display.png
          
          git diff-index --quiet HEAD || (git commit -m "Automated Weekly Wi-Fi Refresh and E-Ink Image Update" && git push)
