name: Weekly Wi-Fi Rotation_Formatted

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: '.' # Forces GitHub to keep the workspace flat and clean

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Fresh HTML Page
        env:
          WIFI_VOUCHERS_RAW: ${{ secrets.WIFI_VOUCHERS }}
        # FIXED: Points exactly to your new version 2 Python script file
        run: python wifi/generate_wifi2.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer Layout Tools
        run: npm install puppeteer

      - name: Render E-Ink Layout Image
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ 
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox'] 
            });
            const page = await browser.newPage();
            
            // Keep the canvas strictly locked to the M5Paper hardware resolution
            await page.setViewport({ width: 960, height: 540 });
            
            // Pointing to your specific v2 HTML template
            await page.goto('file://' + process.cwd() + '/wifi/wifi2.html', { waitUntil: 'networkidle0' });
            
            // Injecting the 75px safety cushion layout rules
            await page.addStyleTag({ content: 'body { padding-top: 75px !important; height: 465px !important; box-sizing: border-box !important; transform: scale(1.0) !important; transform-origin: center center !important; }' });
            
            // Outputting exactly to your target display2.png asset path
            await page.screenshot({ path: 'wifi/display2.png', type: 'png' });
            
            await browser.close();
            console.log('Successfully applied local CSS scaling matrix to M5Paper artifact.');
          })();
          "
      - name: Commit and Push Assets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Force stage ONLY the two target layout assets
          git add -f wifi/wifi2.html
          git add -f wifi/display2.png
          
          # 2. Check for changes strictly within the wifi directory, bypassing node_modules completely
          git diff --cached --quiet || (git commit -m "Automated Weekly Wi-Fi Refresh and E-Ink Flashy Image Update" && git push)
