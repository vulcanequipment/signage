name: Weekly Wi-Fi Rotation

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: '.' # Forces GitHub to keep the workspace flat and clean

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Fresh HTML Page
        env:
          WIFI_VOUCHERS_RAW: ${{ secrets.WIFI_VOUCHERS }}
        run: python wifi/generate_wifi.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer Layout Tools
        run: npm install puppeteer

      - name: Render E-Ink Layout Image
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ 
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox'] 
            });
            const page = await browser.newPage();
            
            // Keep the canvas strictly locked to the M5Paper hardware resolution
            await page.setViewport({ width: 960, height: 540 });
            
            await page.goto('file://' + process.cwd() + '/wifi/wifi.html', { waitUntil: 'networkidle0' });
            
            // INJECTED FIX: 
            // 1. Adds a 75px safety cushion at the top for the C++ headers
            // 2. Shrinks the content height to prevent vertical scrolling
            // 3. Zooms everything up uniformly by 130% while keeping it perfectly centered
            await page.addStyleTag({ content: 'body { padding-top: 75px !important; height: 465px !important; box-sizing: border-box !important; transform: scale(1.30) !important; transform-origin: center center !important; }' });
            
            // Take the crisp, centered snapshot
            await page.screenshot({ path: 'wifi/display2.png', type: 'png' });
            
            await browser.close();
            console.log('Successfully applied local CSS scaling matrix to M5Paper artifact.');
          })();
          "
      - name: Commit and Push Assets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Track both output files
          git add wifi/wifi.html
          git add wifi/display.png
          
          git diff-index --quiet HEAD || (git commit -m "Automated Weekly Wi-Fi Refresh and E-Ink Image Update" && git push)
