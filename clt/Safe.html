<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safety Board</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: black;
        overflow: hidden;

        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Outer wrapper gets uniformly scaled */
    #scale-wrapper {
        transform-origin: center center;
    }

    /* Fixed design canvas: MUST match actual BG image dimensions */
    #board {
        position: relative;
        width: 1564px;
        height: 2048px;

        background-repeat: no-repeat;
        background-position: center center;
        background-size: 100% 100%;
    }

    .counter {
        position: absolute;

        /* precise center based on actual black panel center */
        left: 49.2%;
        transform: translate(-50%, -50%);

        font-family: ubuntu-mono, sans-serif;
        font-weight: normal;
        font-style: normal;
        font-size: 165px;
        line-height: 1;
        color: #7A0002;
        text-align: center;
        white-space: nowrap;
        margin: 0;
        padding: 0;
    }

    /* Centers derived from the actual uploaded background image */
    #DaysSince {
        top: 37.9%;
    }

    #DaysUntil {
        top: 66.5%;
    }
</style>
</head>

<body>
    <div id="scale-wrapper">
        <div id="board">
            <div id="DaysSince" class="counter"></div>
            <div id="DaysUntil" class="counter"></div>
        </div>
    </div>

<script>
/* =========================================
   CONFIGURATION VARIABLES
   Edit these only
========================================= */
const CONFIG = {
    backgroundImage: "SafeBG_2.png",

    sinceDate: "May 7, 2026",
    untilDate: "Apr 25, 2028",

    textColor: "#7A0002",
    fontSize: "165px",

    /* match actual background image dimensions */
    boardWidth: 1564,
    boardHeight: 2048,

    /* panel centers from actual image */
    daysSinceLeft: "49.2%",
    daysSinceTop: "37.9%",

    daysUntilLeft: "49.2%",
    daysUntilTop: "66.5%"
};

/* =========================================
   APPLY CONFIG
========================================= */
const board = document.getElementById("board");
const daysSinceEl = document.getElementById("DaysSince");
const daysUntilEl = document.getElementById("DaysUntil");

board.style.width = CONFIG.boardWidth + "px";
board.style.height = CONFIG.boardHeight + "px";
board.style.backgroundImage = `url('${CONFIG.backgroundImage}')`;

[daysSinceEl, daysUntilEl].forEach(el => {
    el.style.color = CONFIG.textColor;
    el.style.fontSize = CONFIG.fontSize;
});

daysSinceEl.style.left = CONFIG.daysSinceLeft;
daysSinceEl.style.top = CONFIG.daysSinceTop;

daysUntilEl.style.left = CONFIG.daysUntilLeft;
daysUntilEl.style.top = CONFIG.daysUntilTop;

/* =========================================
   COUNTER LOGIC
========================================= */
function updateCounters() {
    const now = new Date();
    const sinceDate = new Date(CONFIG.sinceDate);
    const untilDate = new Date(CONFIG.untilDate);

    const dayMs = 1000 * 60 * 60 * 24;

    const daysSince = Math.ceil((now.getTime() - sinceDate.getTime()) / dayMs);
    const daysUntil = Math.ceil((untilDate.getTime() - now.getTime()) / dayMs);

    daysSinceEl.textContent = daysSince;
    daysUntilEl.textContent = daysUntil;
}

/* =========================================
   SCALE TO FIT AVAILABLE SPACE
   Uniform scaling preserves aspect ratio
========================================= */
function scaleBoard() {
    const scaleX = window.innerWidth / CONFIG.boardWidth;
    const scaleY = window.innerHeight / CONFIG.boardHeight;
    const scale = Math.min(scaleX, scaleY);

    document.getElementById("scale-wrapper").style.transform = `scale(${scale})`;
}

/* =========================================
   INIT
========================================= */
updateCounters();
scaleBoard();

setInterval(updateCounters, 60000);
window.addEventListener("resize", scaleBoard);
</script>
</body>
</html>
