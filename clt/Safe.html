<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safety Board</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background-color: black;

    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* SCALE WRAPPER */
#scale-wrapper {
    transform-origin: center center;
}

/* FIXED CANVAS */
#board {
    position: relative;
    width: 2160px;   /* match your image's true size */
    height: 3840px;

    background-repeat: no-repeat;
    background-size: 100% 100%;  /* CRITICAL FIX */
    background-position: center;
}

/* COUNTERS */
.counter {
    position: absolute;
    left: 50%;
    transform: translate(-50%, -50%); /* center both axes */

    font-family: ubuntu-mono, sans-serif;
    font-size: 330px;
    color: #7A0002;
    text-align: center;
    white-space: nowrap;
}

/* ✅ CALIBRATED TO YOUR IMAGE */
#DaysSince {
    top: 31.5%;
}

#DaysUntil {
    top: 56.5%;
}
</style>
</head>

<body>

<div id="scale-wrapper">
    <div id="board">
        <div id="DaysSince" class="counter"></div>
        <div id="DaysUntil" class="counter"></div>
    </div>
</div>

<script>
/* =========================
   CONFIG (EDIT ONLY HERE)
========================= */
const CONFIG = {
    backgroundImage: "SafeBG_2.png",
    sinceDate: "May 7, 2026",
    untilDate: "Apr 25, 2028",
    textColor: "#7A0002",
    fontSize: "330px"
};

/* =========================
   APPLY CONFIG
========================= */
const board = document.getElementById("board");

board.style.backgroundImage = `url('${CONFIG.backgroundImage}')`;

document.querySelectorAll(".counter").forEach(el => {
    el.style.color = CONFIG.textColor;
    el.style.fontSize = CONFIG.fontSize;
});

/* =========================
   COUNTERS
========================= */
function updateCounters() {
    const now = new Date();

    const sinceDate = new Date(CONFIG.sinceDate);
    const untilDate = new Date(CONFIG.untilDate);

    const dayMs = 1000 * 60 * 60 * 24;

    const daysSince = Math.ceil((now - sinceDate) / dayMs);
    const daysUntil = Math.ceil((untilDate - now) / dayMs);

    document.getElementById("DaysSince").textContent = daysSince;
    document.getElementById("DaysUntil").textContent = daysUntil;
}

/* =========================
   AUTO SCALE
========================= */
function scaleBoard() {
    const scaleX = window.innerWidth / board.offsetWidth;
    const scaleY = window.innerHeight / board.offsetHeight;

    const scale = Math.min(scaleX, scaleY);

    document.getElementById("scale-wrapper").style.transform = `scale(${scale})`;
}

/* =========================
   INIT
========================= */
updateCounters();
scaleBoard();

setInterval(updateCounters, 60000);
window.addEventListener("resize", scaleBoard);

</script>

</body>
</html>
``
