<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safety Board</title>

<style>
    /* =========================================
       GLOBAL 7-SEGMENT FONT
       Root-relative path so all signage pages can use it
    ========================================= */
    @font-face {
        font-family: "SafetyLED";
        src:
            url("/signage/fonts/DSEG7ClassicMini-Bold.woff2") format("woff2"),
            url("/signage/fonts/DSEG7ClassicMini-Bold.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
    }

    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: black;
        overflow: hidden;

        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* =========================================
       SCALED WRAPPER
    ========================================= */
    #scale-wrapper {
        transform-origin: center center;
    }

    /* =========================================
       FIXED DESIGN CANVAS
       MUST MATCH ACTUAL BG IMAGE DIMENSIONS
    ========================================= */
    #board {
        position: relative;
        width: 1564px;
        height: 2048px;
        background-repeat: no-repeat;
        background-position: center center;
        background-size: 100% 100%;
    }

    /* =========================================
       LED COUNTER STYLE
    ========================================= */
    .counter {
        position: absolute;
        transform: translate(-50%, -50%);
        margin: 0;
        padding: 0;

        font-family: "SafetyLED", "Courier New", monospace;
        font-size: 170px;
        line-height: 1;
        letter-spacing: 4px;
        white-space: nowrap;
        text-align: center;

        color: #D60000;

        /* LED glow */
        text-shadow:
            0 0 3px rgba(214, 0, 0, 0.85),
            0 0 6px rgba(214, 0, 0, 0.65),
            0 0 12px rgba(214, 0, 0, 0.45),
            0 0 20px rgba(214, 0, 0, 0.30);
    }

    /*
      These values are calibrated to your uploaded background image.
      Fine tune if needed depending on how this specific font renders.
    */
    #DaysSince {
        left: 49.2%;
        top: 37.9%;
    }

    #DaysUntil {
        left: 49.2%;
        top: 66.5%;
    }
</style>
</head>

<body>
    <div id="scale-wrapper">
        <div id="board">
            <div id="DaysSince" class="counter"></div>
            <div id="DaysUntil" class="counter"></div>
        </div>
    </div>

<script>
/* =========================================
   CONFIGURATION
   Edit only this section
========================================= */
const CONFIG = {
    backgroundImage: "SafeBG_2.png",

    sinceDate: "May 7, 2026",
    untilDate: "Apr 25, 2028",

    boardWidth: 1564,
    boardHeight: 2048,

    textColor: "#D60000",
    fontSize: "170px",

    /* Fine tune if needed */
    daysSinceLeft: "49.2%",
    daysSinceTop: "37.9%",

    daysUntilLeft: "49.2%",
    daysUntilTop: "66.5%"
};

/* =========================================
   ELEMENT REFERENCES
========================================= */
const board = document.getElementById("board");
const scaleWrapper = document.getElementById("scale-wrapper");
const daysSinceEl = document.getElementById("DaysSince");
const daysUntilEl = document.getElementById("DaysUntil");

/* =========================================
   APPLY CONFIG
========================================= */
function applyConfig() {
    board.style.width = CONFIG.boardWidth + "px";
    board.style.height = CONFIG.boardHeight + "px";
    board.style.backgroundImage = `url('${CONFIG.backgroundImage}')`;

    [daysSinceEl, daysUntilEl].forEach(el => {
        el.style.color = CONFIG.textColor;
        el.style.fontSize = CONFIG.fontSize;
    });

    daysSinceEl.style.left = CONFIG.daysSinceLeft;
    daysSinceEl.style.top = CONFIG.daysSinceTop;

    daysUntilEl.style.left = CONFIG.daysUntilLeft;
    daysUntilEl.style.top = CONFIG.daysUntilTop;
}

/* =========================================
   COUNTER LOGIC
========================================= */
function updateCounters() {
    const now = new Date();
    const sinceDate = new Date(CONFIG.sinceDate);
    const untilDate = new Date(CONFIG.untilDate);

    const dayMs = 1000 * 60 * 60 * 24;

    const daysSince = Math.ceil((now.getTime() - sinceDate.getTime()) / dayMs);
    const daysUntil = Math.ceil((untilDate.getTime() - now.getTime()) / dayMs);

    daysSinceEl.textContent = daysSince;
    daysUntilEl.textContent = daysUntil;
}

/* =========================================
   SCALE TO FIT WHILE PRESERVING ASPECT RATIO
========================================= */
function scaleBoard() {
    const scaleX = window.innerWidth / CONFIG.boardWidth;
    const scaleY = window.innerHeight / CONFIG.boardHeight;
    const scale = Math.min(scaleX, scaleY);

    scaleWrapper.style.transform = `scale(${scale})`;
}

/* =========================================
   INIT
========================================= */
applyConfig();
updateCounters();
scaleBoard();

setInterval(updateCounters, 60000);
window.addEventListener("resize", scaleBoard);
</script>
</body>
</html>
